<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公路工程规范查新订阅系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a3a5c, #2980b9); color: white; padding: 24px; text-align: center; }
.header h1 { font-size: 22px; margin-bottom: 6px; }
.header p { font-size: 13px; opacity: 0.85; }

.nav { display: flex; background: white; border-bottom: 1px solid #e0e0e0; }
.nav-btn { flex: 1; padding: 14px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: #666; border-bottom: 3px solid transparent; transition: all 0.2s; }
.nav-btn.active { color: #2980b9; border-bottom-color: #2980b9; font-weight: 600; }
.nav-btn:hover { background: #f8f9fa; }

.page { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.page.active { display: block; }

.card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-title { font-size: 15px; font-weight: 600; color: #2c3e50; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:500px) { .form-row { grid-template-columns: 1fr; } }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
input[type=text], input[type=email] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
input[type=text]:focus, input[type=email]:focus { border-color: #2980b9; }

.btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn-primary { background: #2980b9; color: white; }
.btn-primary:hover { background: #1a6fa0; }
.btn-secondary { background: #f0f4f8; color: #555; border: 1px solid #ddd; }
.btn-secondary:hover { background: #e0e8f0; }
.btn-danger { background: #fff0f0; color: #e74c3c; border: 1px solid #f5c6c6; }
.btn-danger:hover { background: #ffe0e0; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-block { width: 100%; justify-content: center; }

.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-success { background: #e8f8f0; color: #27ae60; }
.badge-warning { background: #fff8e6; color: #e67e22; }
.badge-danger { background: #fff0f0; color: #e74c3c; }
.badge-gray { background: #f0f0f0; color: #888; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card { background: #f8f9fa; border-radius: 8px; padding: 16px; text-align: center; }
.stat-value { font-size: 26px; font-weight: 700; color: #2c3e50; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }

.user-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.user-item:last-child { border-bottom: none; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #2980b9; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 14px; font-weight: 600; color: #2c3e50; }
.user-email { font-size: 12px; color: #888; }

.std-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.std-item:last-child { border-bottom: none; }
.std-code { font-weight: 600; color: #2c3e50; min-width: 150px; }
.std-name { flex: 1; color: #555; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

.empty { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }

.send-bar { background: #f0f7ff; border: 1px solid #bde0ff; border-radius: 8px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.send-bar-text { font-size: 14px; color: #555; }
.send-bar-text strong { color: #2980b9; font-size: 18px; }

.info-list { font-size: 13px; color: #666; line-height: 2; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; }

.type-header { background: #f8f9fa; padding: 8px 12px; font-size: 12px; font-weight: 700; color: #555; border-radius: 4px; margin: 8px 0 4px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; }
.modal h3 { font-size: 16px; margin-bottom: 16px; color: #2c3e50; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 公路工程规范查新订阅系统</h1>
  <p>工地试验室现行规范</p>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('subscribe',this)">📬 订阅</button>
  <button class="nav-btn" onclick="showPage('admin',this)">⚙️ 管理后台</button>
  <button class="nav-btn" onclick="showPage('standards',this)">📚 规范清单</button>
</div>

<!-- 订阅页 -->
<div id="page-subscribe" class="page active">
  <div class="card">
    <div class="card-title">🔔 订阅规范查新报告</div>
    <p style="font-size:13px;color:#666;margin-bottom:16px;line-height:1.7;">填写您的姓名和邮箱，每月1号自动收到最新规范查新报告，掌握行业标准动态。</p>
    <div class="form-row">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="sub-name" placeholder="请输入您的姓名">
      </div>
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="sub-email" placeholder="请输入您的邮箱">
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="subscribe()">✅ 立即订阅</button>
      <button class="btn btn-secondary" onclick="unsubscribe()">❌ 取消订阅</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">ℹ️ 说明</div>
    <div class="info-list">
      <div>• 每月1号自动发送查新报告到您邮箱</div>
      <div>• 报告包含规范更新、废止及全部规范状态</div>
      <div>• 如需修改邮箱，填写新邮箱重新订阅即可</div>
      <div>• 如需退订，填写邮箱后点击取消订阅</div>
    </div>
  </div>
</div>

<!-- 管理后台 -->
<div id="page-admin" class="page">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">订阅人数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="font-size:16px;padding-top:4px;" id="stat-last">—</div>
      <div class="stat-label">上次发送</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="font-size:16px;padding-top:4px;" id="stat-next">—</div>
      <div class="stat-label">下次发送</div>
    </div>
  </div>

  <div class="card">
    <div class="send-bar">
      <div class="send-bar-text">共 <strong id="send-count">0</strong> 位订阅者将收到本月查新报告</div>
      <button class="btn btn-primary" onclick="sendReport()">📤 一键发送报告</button>
    </div>
  </div>

  <div class="card">
    <div class="section-header">
      <span class="section-title">订阅用户管理</span>
      <button class="btn btn-sm btn-secondary" onclick="exportCSV()">⬇️ 导出名单</button>
    </div>
    <div id="user-list"><div class="empty">暂无订阅用户</div></div>
  </div>

  <div class="card">
    <div class="card-title">➕ 手动添加用户</div>
    <div class="form-row">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="admin-name" placeholder="姓名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="admin-email" placeholder="邮箱">
      </div>
    </div>
    <button class="btn btn-primary" onclick="adminAdd()">➕ 添加</button>
  </div>
</div>

<!-- 规范清单 -->
<div id="page-standards" class="page">
  <div class="card">
    <div class="section-header">
      <span class="section-title">规范清单 <span id="std-total" style="color:#aaa;font-weight:400"></span></span>
      <button class="btn btn-sm btn-primary" onclick="showAddStd()">➕ 添加规范</button>
    </div>
    <div id="std-list"><div class="empty">加载中...</div></div>
  </div>
</div>

<!-- 添加规范弹窗 -->
<div class="modal-overlay" id="std-modal">
  <div class="modal">
    <h3>添加规范</h3>
    <div class="form-group"><label>标准代号</label><input type="text" id="new-code" placeholder="如：JTG D30-2015"></div>
    <div class="form-group"><label>标准名称</label><input type="text" id="new-name" placeholder="规范全称"></div>
    <div class="form-group"><label>实施日期</label><input type="text" id="new-date" placeholder="如：2015-06-01"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmAddStd()">确认添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUBS_KEY = 'gfcx_v2_subscribers';
const STDS_KEY = 'gfcx_v2_standards';
const LAST_KEY = 'gfcx_v2_last_send';

const DEFAULT_STANDARDS = [
  {code:'JGJ 52-2006',name:'普通混凝土用砂石质量及检验方法标准',date:'2007-06-01',type:'建工行业标准',status:'现行有效'},
  {code:'JGJ/T 322-2013',name:'混凝土中氯离子含量检测技术规程',date:'2014-06-01',type:'建工行业标准',status:'现行有效'},
  {code:'GB/T14685-2022',name:'建设用卵石、碎石',date:'2022-11-01',type:'国家标准',status:'现行有效'},
  {code:'GB/T 14684-2022',name:'建设用砂',date:'2022-11-01',type:'国家标准',status:'现行有效'},
  {code:'JTG E41-2005',name:'公路工程岩石试验规程',date:'2005-07-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG E42-2005',name:'公路工程集料试验规程',date:'2005-07-01',type:'公路行业标准',status:'现行有效'},
  {code:'JGJ 63-2006',name:'混凝土用水标准',date:'2006-10-01',type:'建工行业标准',status:'现行有效'},
  {code:'GB 8076-2008',name:'混凝土外加剂',date:'2009-03-01',type:'国家标准',status:'现行有效'},
  {code:'GB 50119-2013',name:'混凝土外加剂应用技术规范',date:'2014-03-01',type:'国家标准',status:'现行有效'},
  {code:'GB/T17671-2021',name:'水泥胶砂强度检验方法（ISO法）',date:'2022-03-01',type:'国家标准',status:'现行有效'},
  {code:'JTG 3420-2020',name:'公路工程水泥及水泥混凝土试验规程',date:'2020-10-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG 3430-2020',name:'公路土工试验规程',date:'2020-07-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG 3610-2019',name:'公路路基施工技术规范',date:'2019-11-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG/T 3650-2020',name:'公路桥涵施工技术规范',date:'2020-09-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG 3450-2019',name:'公路路基路面现场测试规程',date:'2019-12-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG E20-2011',name:'公路工程沥青及沥青混合料试验规程',date:'2011-08-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG E51-2009',name:'公路工程无机结合料稳定材料试验规程',date:'2009-05-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG/T 3512-2020',name:'公路工程基桩检测技术规程',date:'2020-09-01',type:'公路行业标准',status:'现行有效'},
  {code:'JTG 3223-2021',name:'公路工程地质原位测试规程',date:'2022-01-01',type:'公路行业标准',status:'现行有效'},
  {code:'GB/T 1499.2-2018',name:'钢筋混凝土用钢 第2部分：热轧带肋钢筋',date:'2018-11-01',type:'国家标准',status:'现行有效'},
  {code:'GB/T 228.1-2021',name:'金属材料 拉伸试验 第1部分：室温试验方法',date:'2022-04-01',type:'国家标准',status:'现行有效'},
  {code:'GB/T5224-2014',name:'预应力混凝土用钢绞线',date:'2015-06-01',type:'国家标准',status:'现行有效'},
  {code:'JGJ 107-2016',name:'钢筋机械连接技术规程',date:'2016-08-01',type:'建工行业标准',status:'现行有效'},
  {code:'JGJ18-2012',name:'钢筋焊接及验收规程',date:'2012-08-01',type:'建工行业标准',status:'现行有效'},
  {code:'GB175-2007',name:'通用硅酸盐水泥',date:'2008-06-01',type:'国家标准',status:'现行有效'},
  {code:'JGJ 55-2011',name:'普通混凝土配合比设计规程',date:'2011-12-01',type:'建工行业标准',status:'现行有效'},
  {code:'GB/T50081-2019',name:'混凝土物理力学性能试验方法标准',date:'2019-12-01',type:'国家标准',status:'现行有效'},
  {code:'JGJ 106-2014',name:'建筑基桩检测技术规范',date:'2014-10-01',type:'建工行业标准',status:'现行有效'},
  {code:'JGJ/T384-2016',name:'钻芯法检测混凝土强度技术规程',date:'2016-11-01',type:'建工行业标准',status:'现行有效'},
  {code:'JGJ/T 23-2011',name:'回弹法检测混凝土抗压强度技术规程',date:'2011-12-01',type:'建工行业标准',status:'现行有效'},
];

let subscribers = [];
let standards = [];

function loadData() {
  try { subscribers = JSON.parse(localStorage.getItem(SUBS_KEY)) || []; } catch { subscribers = []; }
  try { standards = JSON.parse(localStorage.getItem(STDS_KEY)) || DEFAULT_STANDARDS; } catch { standards = DEFAULT_STANDARDS; }
}

function saveSubscribers() { localStorage.setItem(SUBS_KEY, JSON.stringify(subscribers)); }
function saveStandards() { localStorage.setItem(STDS_KEY, JSON.stringify(standards)); }

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'admin') renderAdmin();
  if (name === 'standards') renderStandards();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function initials(name) { return name ? name.slice(0,2) : '?'; }

function subscribe() {
  const name = document.getElementById('sub-name').value.trim();
  const email = document.getElementById('sub-email').value.trim();
  if (!name || !email) { toast('请填写姓名和邮箱'); return; }
  if (!email.includes('@')) { toast('邮箱格式不正确'); return; }
  const existing = subscribers.findIndex(s => s.email === email);
  if (existing >= 0) {
    subscribers[existing].name = name;
    saveSubscribers();
    toast(`已更新 ${name} 的订阅信息`);
  } else {
    subscribers.push({ name, email, date: new Date().toLocaleDateString('zh-CN') });
    saveSubscribers();
    toast(`${name} 订阅成功！每月1号将收到报告`);
  }
  document.getElementById('sub-name').value = '';
  document.getElementById('sub-email').value = '';
}

function unsubscribe() {
  const email = document.getElementById('sub-email').value.trim();
  if (!email) { toast('请填写要取消的邮箱'); return; }
  const idx = subscribers.findIndex(s => s.email === email);
  if (idx < 0) { toast('未找到该邮箱'); return; }
  const name = subscribers[idx].name;
  subscribers.splice(idx, 1);
  saveSubscribers();
  document.getElementById('sub-email').value = '';
  toast(`${name} 已取消订阅`);
}

function renderAdmin() {
  document.getElementById('stat-total').textContent = subscribers.length;
  document.getElementById('send-count').textContent = subscribers.length;
  const now = new Date();
  const next = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  document.getElementById('stat-next').textContent = `${next.getMonth()+1}月1日`;
  const last = localStorage.getItem(LAST_KEY);
  document.getElementById('stat-last').textContent = last || '未发送';

  const el = document.getElementById('user-list');
  if (!subscribers.length) { el.innerHTML = '<div class="empty">暂无订阅用户</div>'; return; }
  el.innerHTML = subscribers.map((s,i) => `
    <div class="user-item">
      <div class="avatar">${initials(s.name)}</div>
      <div class="user-info">
        <div class="user-name">${s.name}</div>
        <div class="user-email">${s.email}</div>
      </div>
      <span class="badge badge-success">已订阅</span>
      <button class="btn btn-sm btn-danger" onclick="removeUser(${i})">删除</button>
    </div>`).join('');
}

function removeUser(i) {
  const name = subscribers[i].name;
  subscribers.splice(i, 1);
  saveSubscribers();
  renderAdmin();
  toast(`已删除 ${name}`);
}

function adminAdd() {
  const name = document.getElementById('admin-name').value.trim();
  const email = document.getElementById('admin-email').value.trim();
  if (!name || !email) { toast('请填写姓名和邮箱'); return; }
  if (subscribers.find(s => s.email === email)) { toast('该邮箱已存在'); return; }
  subscribers.push({ name, email, date: new Date().toLocaleDateString('zh-CN') });
  saveSubscribers();
  document.getElementById('admin-name').value = '';
  document.getElementById('admin-email').value = '';
  renderAdmin();
  toast('添加成功');
}

function sendReport() {
  if (!subscribers.length) { toast('暂无订阅用户'); return; }
  const today = new Date().toLocaleDateString('zh-CN');
  localStorage.setItem(LAST_KEY, today);
  document.getElementById('stat-last').textContent = today;
  toast(`已触发发送，共 ${subscribers.length} 位订阅者`);
}

function exportCSV() {
  if (!subscribers.length) { toast('暂无数据'); return; }
  const rows = ['\uFEFF姓名,邮箱,订阅日期', ...subscribers.map(s => `${s.name},${s.email},${s.date}`)];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '订阅名单.csv';
  a.click();
  toast('导出成功');
}

const TYPE_ORDER = ['国家标准','公路行业标准','建工行业标准','铁路行业标准','其他标准'];

function renderStandards() {
  document.getElementById('std-total').textContent = `(${standards.length}条)`;
  const el = document.getElementById('std-list');
  let html = '';
  TYPE_ORDER.forEach(type => {
    const group = standards.filter(s => s.type === type);
    if (!group.length) return;
    html += `<div class="type-header">${type}（${group.length}条）</div>`;
    group.forEach((s, gi) => {
      const realIdx = standards.indexOf(s);
      const statusClass = s.status === '现行有效' ? 'badge-success' : s.status === '有新版本' ? 'badge-warning' : s.status === '已废止' ? 'badge-danger' : 'badge-gray';
      html += `<div class="std-item">
        <span class="std-code">${s.code}</span>
        <span class="std-name">${s.name}</span>
        <span class="badge ${statusClass}">${s.status}</span>
        <button class="btn btn-sm btn-danger" onclick="removeStd(${realIdx})">删除</button>
      </div>`;
    });
  });
  el.innerHTML = html || '<div class="empty">暂无规范</div>';
}

function showAddStd() { document.getElementById('std-modal').classList.add('show'); }
function closeModal() { document.getElementById('std-modal').classList.remove('show'); }

function getTypeFromCode(code) {
  if (!code) return '其他标准';
  const c = code.toUpperCase();
  if (c.startsWith('GB')) return '国家标准';
  if (c.startsWith('JTG') || c.startsWith('JT/')) return '公路行业标准';
  if (c.startsWith('JGJ') || c.startsWith('JG/') || c.startsWith('JC/')) return '建工行业标准';
  if (c.startsWith('TB')) return '铁路行业标准';
  return '其他标准';
}

function confirmAddStd() {
  const code = document.getElementById('new-code').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const date = document.getElementById('new-date').value.trim();
  if (!code || !name) { toast('请填写标准代号和名称'); return; }
  standards.push({ code, name, date: date || '/', type: getTypeFromCode(code), status: '现行有效' });
  saveStandards();
  closeModal();
  document.getElementById('new-code').value = '';
  document.getElementById('new-name').value = '';
  document.getElementById('new-date').value = '';
  renderStandards();
  toast('添加成功');
}

function removeStd(i) {
  standards.splice(i, 1);
  saveStandards();
  renderStandards();
  toast('已删除');
}

loadData();
</script>
</body>
</html>
